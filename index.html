<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Número Secreto</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #121212;
  color: white;
  padding: 20px;
}

.container {
  max-width: 400px;
  margin: auto;
}

input, button {
  padding: 12px;
  margin: 10px;
  width: 80%;
  font-size: 18px;
}
</style>
</head>

<body>

<div class="container">
  <h1>🎯 Número Secreto</h1>
  <h2>Oi Pi 👋</h2>

  <p>Escolha um número entre 1 e 100</p>

  <input type="number" id="chute">
  <button onclick="jogar()">Chutar</button>

  <p id="mensagem"></p>
</div>

<script>
let numero = 32;
let tentativas = 1;

function jogar() {
  let chute = Number(document.getElementById("chute").value);
  let msg = document.getElementById("mensagem");

  if (!chute || chute < 1 || chute > 100) {
    msg.innerText = "Digite um número válido!";
    return;
  }

  if (chute === numero) {
    msg.innerText = `🎉 Acertou em ${tentativas} tentativas!`;
  } else if (chute > numero) {
    msg.innerText = "📉 Menor!";
  } else {
    msg.innerText = "📈 Maior!";
  }

  tentativas++;
}
</script>

</body>
</html>
